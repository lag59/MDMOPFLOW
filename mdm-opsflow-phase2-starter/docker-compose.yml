services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mdm_opsflow
      POSTGRES_USER: mdm
      POSTGRES_PASSWORD: mdm_dev_password
    ports: ["5432:5432"]
  backend:
    build: ./backend
    environment:
      ENVIRONMENT: development
      SECRET_KEY: change-me
      DATABASE_URL: postgresql+psycopg://mdm:mdm_dev_password@db:5432/mdm_opsflow
      ALLOWED_ORIGINS: http://localhost:3000
      PORT: 8080
    ports: ["8080:8080"]
    depends_on: [db]
  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports: ["3000:3000"]
    depends_on: [backend]
